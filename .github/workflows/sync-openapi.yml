name: Sync OpenAPI
on:
  schedule:
    - cron: '17 6 * * *'  # daily ~06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch upstream openapi.yaml
        run: curl -fsSL https://raw.githubusercontent.com/leifericf/noumenon/main/resources/openapi.yaml -o openapi.yaml
      - name: Commit if changed
        run: |
          if git diff --quiet openapi.yaml; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.yaml
          git commit -m "chore: sync openapi.yaml from leifericf/noumenon"
          git push
